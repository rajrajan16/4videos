<!DOCTYPE html>
<html>
<head>
    <title>My YouTube Video Grid - With Ticker Borders</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            width: 1920px;
            height: 1080px;
            overflow: hidden;
            background: black;
            font-family: 'Arial', sans-serif;
        }
        
        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: 1fr 1fr;
            width: 100%;
            height: 100%;
            gap: 8px;
            padding: 8px;
        }
        
        .video-box {
            position: relative;
            background: #111;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }
        
        /* Animated scanning border */
        .video-box::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 3px;
            background: linear-gradient(90deg, transparent, #ff0000, #00ff00, #0000ff, transparent);
            animation: scan 4s linear infinite;
            z-index: 10;
        }
        
        /* Bottom border with text ticker */
        .video-ticker {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 30px;
            background: rgba(0,0,0,0.8);
            border-top: 2px solid #ff0000;
            border-bottom: 2px solid #ff0000;
            overflow: hidden;
            z-index: 20;
        }
        
        .ticker-text {
            position: absolute;
            white-space: nowrap;
            color: white;
            font-size: 18px;
            line-height: 30px;
            animation: ticker 15s linear infinite;
            padding-left: 20px;
        }
        
        /* Corner accents */
        .corner-accent {
            position: absolute;
            width: 20px;
            height: 20px;
            border: 2px solid #ff0000;
            z-index: 15;
        }
        
        .corner-tl {
            top: 5px;
            left: 5px;
            border-right: none;
            border-bottom: none;
        }
        
        .corner-tr {
            top: 5px;
            right: 5px;
            border-left: none;
            border-bottom: none;
        }
        
        .corner-bl {
            bottom: 35px;
            left: 5px;
            border-right: none;
            border-top: none;
        }
        
        .corner-br {
            bottom: 35px;
            right: 5px;
            border-left: none;
            border-top: none;
        }
        
        .video-box iframe {
            width: 100%;
            height: 100%;
            border: none;
            pointer-events: none;
        }
        
        /* Video number badge */
        .video-badge {
            position: absolute;
            top: 10px;
            left: 10px;
            background: #ff0000;
            color: white;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 16px;
            z-index: 30;
            border: 2px solid white;
            box-shadow: 0 0 10px rgba(255,0,0,0.5);
        }
        
        @keyframes scan {
            0% { left: -100%; }
            100% { left: 200%; }
        }
        
        @keyframes ticker {
            0% { transform: translateX(100%); }
            100% { transform: translateX(-100%); }
        }
        
        /* Glow effect on hover (optional - for preview) */
        .video-box:hover {
            box-shadow: 0 0 30px rgba(255,0,0,0.3);
            transition: box-shadow 0.3s;
        }
    </style>
</head>
<body>
    <div class="grid">
        <!-- Top Left - Video 1 -->
        <div class="video-box">
            <div class="video-badge">1</div>
            <div class="corner-accent corner-tl"></div>
            <div class="corner-accent corner-tr"></div>
            <div class="corner-accent corner-bl"></div>
            <div class="corner-accent corner-br"></div>
            <div class="video-ticker">
                <div class="ticker-text">🔴 LIVE: Video 1 - Amazing Content • 4K Quality • 60fps • </div>
            </div>
            <iframe 
                src="https://www.youtube.com/embed/33F4Lmr-nKY?autoplay=1&mute=1&loop=1&playlist=33F4Lmr-nKY&controls=0&showinfo=0&modestbranding=1&iv_load_policy=3&disablekb=1&fs=0&rel=0">
            </iframe>

</body>
