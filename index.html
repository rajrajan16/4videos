<!DOCTYPE html>
<html>
<head>
    <title>My YouTube Video Grid - 720p</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            width: 1280px;  /* 720p width */
            height: 720px;   /* 720p height */
            overflow: hidden;
            background: black;
            font-family: 'Arial', sans-serif;
        }
        
        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: 1fr 1fr;
            width: 100%;
            height: 100%;
            gap: 4px;
            padding: 4px;
        }
        
        .video-box {
            position: relative;
            background: #111;
            border-radius: 6px;
            overflow: hidden;
            box-shadow: 0 0 15px rgba(255,0,0,0.2);
            border: 2px solid #ff0000;
        }
        
        /* Animated corner borders */
        .video-box::before {
            content: '';
            position: absolute;
            top: -2px;
            left: -2px;
            right: -2px;
            bottom: -2px;
            border: 2px solid transparent;
            border-radius: 8px;
            background: linear-gradient(90deg, #ff0000, #ff4444, #ff0000) border-box;
            -webkit-mask: linear-gradient(#fff 0 0) padding-box, linear-gradient(#fff 0 0);
            -webkit-mask-composite: destination-out;
            mask-composite: exclude;
            animation: borderGlow 2s linear infinite;
            z-index: 5;
        }
        
        /* Bottom ticker - adjusted for 720p */
        .video-ticker {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 24px;  /* Smaller for 720p */
            background: rgba(0,0,0,0.85);
            border-top: 2px solid #ff0000;
            overflow: hidden;
            z-index: 20;
            backdrop-filter: blur(2px);
        }
        
        .ticker-text {
            position: absolute;
            white-space: nowrap;
            color: white;
            font-size: 14px;  /* Adjusted for 720p */
            line-height: 24px;
            animation: ticker 12s linear infinite;
            padding-left: 15px;
            text-shadow: 1px 1px 2px black;
            font-weight: bold;
            letter-spacing: 0.5px;
        }
        
        /* Top badge - adjusted for 720p */
        .video-badge {
            position: absolute;
            top: 5px;
            left: 5px;
            background: #ff0000;
            color: white;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 12px;
            z-index: 30;
            border: 1px solid white;
            box-shadow: 0 0 8px rgba(255,0,0,0.5);
        }
        
        /* Title overlay - adjusted for 720p */
        .video-title {
            position: absolute;
            top: 5px;
            right: 5px;
            background: rgba(0,0,0,0.7);
            color: #ff0000;
            padding: 3px 10px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: bold;
            z-index: 30;
            border: 1px solid #ff0000;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .video-box iframe {
            width: 100%;
            height: 100%;
            border: none;
            pointer-events: none;
        }
        
        /* Corner accents - adjusted for 720p */
        .corner {
            position: absolute;
            width: 15px;
            height: 15px;
            border: 2px solid #ff0000;
            z-index: 25;
            filter: drop-shadow(0 0 3px #ff0000);
        }
        
        .corner-tl {
            top: 2px;
            left: 2px;
            border-right: none;
            border-bottom: none;
        }
        
        .corner-tr {
            top: 2px;
            right: 2px;
            border-left: none;
            border-bottom: none;
        }
        
        .corner-bl {
            bottom: 26px;
            left: 2px;
            border-right: none;
            border-top: none;
        }
        
        .corner-br {
            bottom: 26px;
            right: 2px;
            border-left: none;
            border-top: none;
        }
        
        @keyframes ticker {
            0% { transform: translateX(100%); }
            100% { transform: translateX(-100%); }
        }
        
        @keyframes borderGlow {
            0% { opacity: 0.5; }
            50% { opacity: 1; }
            100% { opacity: 0.5; }
        }
        
        /* Add a subtle overlay to make text more readable */
        .video-box::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(45deg, transparent 95%, rgba(255,0,0,0.1) 100%);
            pointer-events: none;
            z-index: 10;
        }
    </style>
</head>
<body>

</body>
