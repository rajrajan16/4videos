<!DOCTYPE html>
<html>
<head>
    <title>My YouTube Video Grid</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            width: 1920px;
            height: 1080px;
            overflow: hidden;
            background: black;
        }
        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            grid-template-rows: 1fr 1fr;
            width: 100%;
            height: 100%;
            gap: 2px;
        }
        .video-box {
            width: 100%;
            height: 100%;
            overflow: hidden;
        }
        .video-box iframe {
            width: 100%;
            height: 100%;
            border: none;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div class="grid">
        <!-- Top Left -->
        <div class="video-box">
            <iframe src="https://www.youtube.com/embed/33F4Lmr-nKY?autoplay=1&mute=1&loop=1&playlist=33F4Lmr-nKY&controls=0&showinfo=0&modestbranding=1&iv_load_policy=3&disablekb=1&fs=0&rel=0"></iframe>
        </div>
        <!-- Top Right -->
        <div class="video-box">
            <iframe src="https://www.youtube.com/embed/rxNWteW32hU?autoplay=1&mute=1&loop=1&playlist=rxNWteW32hU&controls=0&showinfo=0&modestbranding=1&iv_load_policy=3&disablekb=1&fs=0&rel=0"></iframe>
        </div>
        <!-- Bottom Left -->
        <div class="video-box">
            <iframe src="https://www.youtube.com/embed/7OxE7FwJPJM?autoplay=1&mute=1&loop=1&playlist=7OxE7FwJPJM&controls=0&showinfo=0&modestbranding=1&iv_load_policy=3&disablekb=1&fs=0&rel=0"></iframe>
        </div>
        <!-- Bottom Right -->
        <div class="video-box">
            <iframe src="https://www.youtube.com/embed/jRxHH56sehc?autoplay=1&mute=1&loop=1&playlist=jRxHH56sehc&controls=0&showinfo=0&modestbranding=1&iv_load_policy=3&disablekb=1&fs=0&rel=0"></iframe>
        </div>
    </div>
</body>
</html>
